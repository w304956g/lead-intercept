<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lead Intercept — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0A0A0A;--surface:#111;--surface2:#191919;
    --border:#2A2A2A;--border2:#333;
    --gold:#C8A84B;--gold2:#E8C96B;--gold-dim:#7A6530;
    --text:#F0EDE6;--muted:#888;--dim:#444;
    --red:#E05555;
    --font-head:'Syne',sans-serif;--font-mono:'DM Mono',monospace;
  }
  body{
    background:var(--bg);color:var(--text);font-family:var(--font-head);
    min-height:100vh;display:flex;align-items:center;justify-content:center;
  }

  /* Subtle grid background */
  body::before{
    content:'';position:fixed;inset:0;
    background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
    background-size:48px 48px;opacity:.4;pointer-events:none;
  }

  .card{
    position:relative;width:100%;max-width:380px;margin:20px;
    background:var(--surface);border:1px solid var(--border2);border-radius:12px;
    padding:40px 36px;display:flex;flex-direction:column;gap:28px;
  }

  .top{display:flex;flex-direction:column;gap:8px}
  .wordmark{font-size:11px;font-weight:700;letter-spacing:.16em;color:var(--gold);text-transform:uppercase}
  .wordmark span{color:var(--dim)}
  .headline{font-size:22px;font-weight:800;line-height:1.15}
  .sub{font-family:var(--font-mono);font-size:11px;color:var(--muted);line-height:1.5}

  .divider{height:1px;background:var(--border)}

  .form{display:flex;flex-direction:column;gap:14px}
  .field-label{font-family:var(--font-mono);font-size:9px;color:var(--muted);margin-bottom:5px;letter-spacing:.08em;text-transform:uppercase}
  .field-wrap{position:relative}
  .field-input{
    width:100%;background:var(--surface2);border:1px solid var(--border2);
    border-radius:6px;padding:11px 14px;
    font-family:var(--font-mono);font-size:13px;color:var(--text);
    outline:none;transition:border-color .15s;
  }
  .field-input:focus{border-color:var(--gold-dim)}
  .field-input::placeholder{color:var(--dim)}

  .btn{
    width:100%;padding:12px;border-radius:6px;border:none;cursor:pointer;
    font-family:var(--font-head);font-size:12px;font-weight:700;
    letter-spacing:.08em;text-transform:uppercase;
    background:var(--gold);color:#000;transition:all .15s;
    display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .btn:hover{background:var(--gold2)}
  .btn:disabled{opacity:.5;cursor:not-allowed}

  .error{
    display:none;font-family:var(--font-mono);font-size:10px;
    color:var(--red);padding:8px 12px;
    background:rgba(224,85,85,.08);border:1px solid rgba(224,85,85,.2);
    border-radius:5px;
  }
  .error.show{display:block}

  .footer{font-family:var(--font-mono);font-size:9px;color:var(--dim);text-align:center}

  /* Spinner */
  @keyframes spin{to{transform:rotate(360deg)}}
  .spinner{width:14px;height:14px;border:2px solid rgba(0,0,0,.3);border-top-color:#000;border-radius:50%;animation:spin .6s linear infinite;display:none}
  .btn.loading .spinner{display:block}
  .btn.loading .btn-text{display:none}
</style>
</head>
<body>
<div class="card">
  <div class="top">
    <div class="wordmark">Lead Intercept <span>// Key Buick GMC</span></div>
    <div class="headline">Sign in to<br>your dashboard</div>
    <div class="sub">Enter your password to access<br>the lead management system.</div>
  </div>

  <div class="divider"></div>

  <div class="form">
    <div>
      <div class="field-label">Password</div>
      <div class="field-wrap">
        <input
          class="field-input"
          type="password"
          id="password"
          placeholder="Enter password"
          autofocus
          onkeydown="if(event.key==='Enter')login()"
        >
      </div>
    </div>
    <div class="error" id="error-msg">Incorrect password. Try again.</div>
    <button class="btn" id="login-btn" onclick="login()">
      <span class="btn-text">Sign in</span>
      <div class="spinner"></div>
    </button>
  </div>

  <div class="footer">Key Buick GMC · Internal use only</div>
</div>

<script>
async function login() {
  const password = document.getElementById('password').value;
  if (!password) return;

  const btn = document.getElementById('login-btn');
  const err = document.getElementById('error-msg');
  btn.classList.add('loading');
  btn.disabled = true;
  err.classList.remove('show');

  try {
    const res = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password })
    });
    const data = await res.json();

    if (data.ok) {
      window.location.href = '/';
    } else {
      err.classList.add('show');
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }
  } catch(e) {
    err.textContent = 'Connection error. Try again.';
    err.classList.add('show');
  }

  btn.classList.remove('loading');
  btn.disabled = false;
}
</script>
</body>
</html>
